<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/sohojatra_ico.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta
      name="description"
      content="Share rides and travel together with Sohojatra"
    />
    <link rel="apple-touch-icon" href="/sohojatra-splash.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sohojatra" />

    <!-- Content Security Policy -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://*.tile.openstreetmap.org https://vercel.live;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.tile.openstreetmap.org;
        img-src 'self' data: https: blob: https://*.tile.openstreetmap.org https://*.tile.opentopomap.org;
        font-src 'self' data: https://fonts.gstatic.com;
        connect-src 'self' https: wss: https://uilczasyxzskollvapyr.supabase.co wss://uilczasyxzskollvapyr.supabase.co https://*.ably.io wss://*.ably.io https://*.tile.openstreetmap.org https://*.tile.opentopomap.org https://vercel.live wss://ws-us3.pusher.com;
        base-uri 'self';
        form-action 'self';
        worker-src 'self' blob:;
        media-src 'self' blob:;
        frame-src 'self' https://vercel.live;
      "
    />

    <!-- Additional Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>Sohojatra</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
