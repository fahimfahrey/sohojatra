name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Run npm audit (high+critical fail)
        run: npm audit --audit-level=high

      - name: Full audit report (advisory)
        if: always()
        run: npm audit --json > npm-audit.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 30
